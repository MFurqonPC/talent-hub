; Optimasi OPcache — menyimpan bytecode PHP yang sudah dikompilasi di memory,
; supaya tidak perlu parse ulang file PHP di setiap request (dampaknya besar
; terutama untuk Laravel yang punya banyak file class).

opcache.enable=1
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
opcache.validate_timestamps=1
opcache.revalidate_freq=2
opcache.save_comments=1

; validate_timestamps=1 (bukan 0) sengaja dipakai supaya perubahan kode kamu
; tetap otomatis kebaca tiap beberapa detik tanpa perlu restart container —
; penting karena project masih aktif dikembangkan untuk hackathon.
