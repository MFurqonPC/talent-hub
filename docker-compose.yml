version: '3.8'

services:
    app:
        build:
            context: .
            dockerfile: docker/Dockerfile
        container_name: talent-hub-app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./storage:/var/www/storage
            - ./.env:/var/www/.env
            - ./public/build:/var/www/public/build
        environment:
            DB_CONNECTION: mysql
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: talent_hub
            DB_USERNAME: talent_user
            DB_PASSWORD: talent_pass
        depends_on:
            - db
        networks:
            - talent-hub-network

    nginx:
        image: nginx:alpine
        container_name: talent-hub-nginx
        restart: unless-stopped
        ports:
            - "8080:80"
        volumes:
            - ./public:/var/www/public
            - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - talent-hub-network

    db:
        image: mysql:8.0
        container_name: talent-hub-db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: talent_hub
            MYSQL_USER: talent_user
            MYSQL_PASSWORD: talent_pass
            MYSQL_ROOT_PASSWORD: root_secret
        volumes:
            - talent-hub-dbdata:/var/lib/mysql
        ports:
            - "3307:3306" # dipetakan ke 3307 di host supaya tidak bentrok dengan MySQL XAMPP lokal
        networks:
            - talent-hub-network

    phpmyadmin:
        image: phpmyadmin:latest
        container_name: talent-hub-phpmyadmin
        restart: unless-stopped
        environment:
            PMA_HOST: db
            PMA_USER: talent_user
            PMA_PASSWORD: talent_pass
        ports:
            - "8081:80"
        depends_on:
            - db
        networks:
            - talent-hub-network

networks:
    talent-hub-network:
        driver: bridge

volumes:
    talent-hub-dbdata:
        driver: local
